name: Fly Deploy
# Auto-despliega Hydra a Fly.io en cada push a main.
# Requiere el secreto FLY_API_TOKEN en el repositorio de GitHub
# (Settings -> Secrets and variables -> Actions -> New repository secret).
# El token se genera con:  fly tokens create deploy -a hydra-trading

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
