# fly.toml app configuration file generated for hydra-trading on 2026-07-09T03:48:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hydra-trading'
primary_region = 'ams'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
