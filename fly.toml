# Hydra Trading — configuracion de Fly.io
# Cambia "hydra-trading" por el nombre real de tu app si es distinto.
app = "hydra-trading"
primary_region = "ams"   # coincide con tu deploy actual

[build]

[env]
  PORT = "8000"
  DATA_DIR = "/data"

# El servicio web (dashboard + OAuth). internal_port DEBE coincidir con PORT.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false      # el cerebro debe estar SIEMPRE encendido
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

# Chequeo de salud: /status responde aunque no haya conexion con cTrader.
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/status"

# Volumen persistente: aqui viven los tokens OAuth y la base de datos.
# "source" DEBE coincidir con el nombre del volumen ya adjunto a la maquina
# (mira `fly volumes list`). Fly creo uno llamado "data" en el primer launch.
[mounts]
  source = "data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
